<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mab Sports Ballclub</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <div id="login-screen" class="screen active">
    <div class="badge">&#127936;</div>
    <div class="login-title">MAB SPORTS</div>
    <div class="login-sub">BALLCLUB &middot; OWNER SIGN IN</div>
    <input type="text" id="username-input" placeholder="Username">
    <input type="password" id="password-input" placeholder="Password">
    <button class="primary" onclick="login()">Log In</button>
    <div class="error-msg" id="login-error">Incorrect username or password</div>
  </div>

  <div id="app-screen" class="screen">
    <header>
      <div class="header-badge">&#127936;</div>
      <h1>MAB SPORTS BALLCLUB</h1>
    </header>
    <nav>
      <button id="nav-history" onclick="switchTab('history')">History</button>
      <button id="nav-session" onclick="switchTab('session')">Session</button>
      <button id="nav-members" onclick="switchTab('members')">Members</button>
    </nav>
    <main>

      <div id="history-tab">
        <div id="sessions-list"></div>
      </div>

      <div id="session-tab" style="display:none;">
        <button class="start-btn" onclick="startSession()">Start New Session</button>
        <div id="session-empty" style="display:block;">
          <div class="empty-state">No active session. Click "Start New Session" to begin.</div>
        </div>
        <div id="session-active" style="display:none;">
          <div class="session-top">
            <span class="session-title" id="session-title"></span>
            <button class="close-btn" onclick="switchTab('history')">← Back</button>
          </div>
          <div class="link-box">
            <div class="link-label">SHARE LINK FOR JOINERS</div>
            <div class="link-row">
              <span class="link-text" id="share-link"></span>
              <button class="copy-btn" onclick="copyLink()">Copy</button>
            </div>
          </div>
          <div id="session-detail"></div>
        </div>
      </div>

      <div id="members-tab" style="display:none;">
        <div class="section-label">MEMBERS LIST</div>
        <div class="add-row">
          <input type="text" id="member-name" placeholder="Name">
          <input type="tel" id="member-phone" placeholder="Phone">
          <button onclick="addMember()">Add</button>
        </div>
        <div id="members-list"></div>
      </div>

    </main>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
