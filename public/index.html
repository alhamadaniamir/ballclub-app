<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAB sports Ballclub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --deep-red-1: #8B1A1A;
      --deep-red-2: #B22222;
      --muted-maroon: #6F2A2A;
      --black: #0D0D0D;
      --chrome-silver: #E8E8E8;
      --steel-gray: #4A4A4A;
      --royal-blue: #1E5FA8;
      --orange: #F2A33D;
      --green: #3C9A4C;
      --yellow: #F2D03B;
    }

    body.app-body{
      background: var(--black);
      color: var(--chrome-silver);
      min-height: 100vh;
    }

    .container h1{ color: var(--chrome-silver); }

    .brand{ display:flex; align-items:center; gap:0.75rem; }
    .brand img{ width:48px; height:48px; object-fit:cover; border-radius:8px; border:1px solid rgba(255,255,255,0.06); }
    .brand .title{ font-size:1.25rem; font-weight:700; color:var(--chrome-silver); }
    .brand .subtitle{ font-size:0.85rem; color: rgba(232,232,232,0.75); margin-top: -2px; }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.05));
      border: 1px solid rgba(74,74,74,0.7); /* softer steel gray */
      color: var(--chrome-silver);
    }

    .btn-primary{
      background: linear-gradient(90deg, var(--royal-blue), #16508a);
      border: 1px solid rgba(30,95,168,0.9);
      color: #fff;
    }

    .btn-outline-primary{
      color: var(--chrome-silver);
      border-color: rgba(30,95,168,0.9);
    }
    .btn-outline-primary:hover{ background: rgba(30,95,168,0.06); }

    .badge-paid{ background: var(--green); color: #fff; }
    .badge-unpaid{
      background: var(--steel-gray);
      color: var(--chrome-silver);
      border-left: 6px solid var(--muted-maroon);
      padding-left: 0.45rem;
    }

    /* smaller text muted color */
    .text-muted{ color: rgba(232,232,232,0.7) !important; }

    /* touch-friendly spacing */
    .card .btn{ padding: 0.5rem 0.75rem; }
  </style>
</head>
<body class="app-body">
  <div class="container py-4">
    <div class="brand mb-3">
      <img src="https://scontent.fcgm1-1.fna.fbcdn.net/v/t39.30808-6/702676779_972182429045167_4299831108499768995_n.jpg?stp=dst-jpg_tt6&cstp=mx960x960&ctp=s960x960&_nc_cat=101&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeGj5KWHB3GREBDdeAAgFt8Wlm62vpADL-CWbra-kAMv4K1W-Yhdm_-jX2rZKWRRqKVNgrFuzJWuICcnst7zXdy0&_nc_ohc=BbwV3oedYuQQ7kNvwG5WsIR&_nc_oc=Ado9v0pBrOAHW9MUDF9HGxV0a2TQ7X0880bM7VJapqGkLPl303jqkhEqdT8Li5csMxo&_nc_zt=23&_nc_ht=scontent.fcgm1-1.fna&_nc_gid=2PdlqjHi7-PG7CWhQ4qyxA&_nc_ss=7b2a8&oh=00_AQA7OpejC5oOJfZt4dox1kNBO1svEg5az6QlES2fD9GKIg&oe=6A499D78" alt="MAB sports logo">
      <div>
        <div class="title">MAB sports Ballclub</div>
        <div class="subtitle">Player queue & payments</div>
      </div>
    </div>

    <!-- Add player (moved to top for mobile-first experience) -->
    <div class="card mb-3">
      <div class="card-body">
        <form id="addForm" class="row g-2 align-items-center">
          <div class="col-9 col-sm-8">
            <input id="name" class="form-control" placeholder="Name (required)" required>
          </div>
          <div class="col-3 col-sm-4 d-grid">
            <button class="btn btn-primary">Add to Queue</button>
          </div>
        </form>
      </div>
    </div>

    <div id="players" class="row g-3"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
