<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — MAB sports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{
      --deep-red-1: #8B1A1A;
      --deep-red-2: #B22222;
      --muted-maroon: #6F2A2A;
      --black: #0D0D0D;
      --chrome-silver: #E8E8E8;
      --steel-gray: #4A4A4A;
      --royal-blue: #1E5FA8;
      --orange: #F2A33D;
      --green: #3C9A4C;
      --yellow: #F2D03B;
    }
    body.app-body{ background: var(--black); color: var(--chrome-silver); min-height:100vh }
    .brand{ display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem }
    .brand img{ width:40px; height:40px; object-fit:cover; border-radius:6px }
    .brand .title{ font-size:1.1rem; font-weight:700; color:var(--chrome-silver) }
    .topbar{ display:flex; gap:0.5rem; align-items:center; justify-content:space-between; margin-bottom:1rem }
    .menu{ display:flex; gap:0.5rem }
    .card.dark{ background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.05)); border:1px solid rgba(74,74,74,0.7); color:var(--chrome-silver); }
    .btn-primary{ background: linear-gradient(90deg, var(--royal-blue), #16508a); border:1px solid rgba(30,95,168,0.9); color:#fff }
  </style>
</head>
<body class="app-body">
  <div class="container py-4">
    <div class="brand">
      <img src="https://scontent.fcgm1-1.fna.fbcdn.net/v/t39.30808-6/702676779_972182429045167_4299831108499768995_n.jpg?stp=dst-jpg_tt6&cstp=mx960x960&ctp=s960x960&_nc_cat=101&ccb=1-7&_nc_sid=6ee11a&_nc_eui2=AeGj5KWHB3GREBDdeAAgFt8Wlm62vpADL-CWbra-kAMv4K1W-Yhdm_-jX2rZKWRRqKVNgrFuzJWuICcnst7zXdy0&_nc_ohc=BbwV3oedYuQQ7kNvwG5WsIR&_nc_oc=Ado9v0pBrOAHW9MUDF9HGxV0a2TQ7X0880bM7VJapqGkLPl303jqkhEqdT8Li5csMxo&_nc_zt=23&_nc_ht=scontent.fcgm1-1.fna&_nc_gid=2PdlqjHi7-PG7CWhQ4qyxA&_nc_ss=7b2a8&oh=00_AQA7OpejC5oOJfZt4dox1kNBO1svEg5az6QlES2fD9GKIg&oe=6A499D78" alt="MAB">
      <div>
        <div class="title">MAB sports Ballclub — Admin</div>
      </div>
    </div>

    <div class="auth-wrapper d-flex justify-content-center align-items-center" style="min-height:28vh;">
      <div id="authBox" class="mb-3 w-100 d-flex justify-content-center">
        <form id="loginForm" class="row g-2 card dark p-3" style="max-width:480px; width:100%">
          <div class="col-12"><input id="username" class="form-control" placeholder="Username" required></div>
          <div class="col-12"><input id="password" type="password" class="form-control" placeholder="Password" required></div>
          <div class="col-12 d-grid"><button class="btn btn-primary">Login</button></div>
        </form>
      </div>
    </div>

    <div id="dashboard" style="display:none">
      <div class="topbar">
        <div class="menu">
          <button id="btnHistory" class="btn btn-outline-primary">History</button>
          <button id="btnGenerate" class="btn btn-outline-primary">Generate Game</button>
        </div>
        <div>
          <button id="logoutBtn" class="btn btn-outline-primary">Logout</button>
        </div>
      </div>

      <div id="liveArea">
        <h5>Live Queue</h5>
        <div id="livePlayers" class="list-group mb-3"></div>
        <div class="d-grid mb-3"><button id="createGame" class="btn btn-primary">Create Game from Queue</button></div>
      </div>

      <div id="historyArea" style="display:none">
        <h5>Game History</h5>
        <ul id="gamesList" class="list-group"></ul>
      </div>
    </div>
  </div>

  <script>
    async function showDashboard(){
      document.getElementById('authBox').style.display='none';
      document.getElementById('dashboard').style.display='block';
      loadPlayers(); loadGames();
    }

    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username,password}), credentials: 'include'});
      if (res.ok) { showDashboard(); }
      else {
        const t = await res.json().catch(()=>({}));
        alert('login failed: '+(t.error||'unknown'));
      }
    });

    document.getElementById('logoutBtn').addEventListener('click', async ()=>{
      await fetch('/api/logout',{method:'POST', credentials: 'include'});
      location.reload();
    });

    async function loadPlayers(){
      const res = await fetch('/api/players');
      const players = await res.json();
      const el = document.getElementById('livePlayers'); el.innerHTML='';
      players.forEach((p,idx)=>{
        const item = document.createElement('div'); item.className='list-group-item d-flex justify-content-between align-items-center';
        item.innerHTML = `<div>${idx+1}. <strong>${p.name}</strong><div class="small text-muted">Joined: ${new Date(p.created_at).toLocaleString()}</div></div><div><span class="badge ${p.paid? 'badge-paid':'badge-unpaid'} me-2">${p.paid? 'Paid':'Unpaid'}</span></div>`;
        el.appendChild(item);
      });
    }

    async function loadGames(){
      const res = await fetch('/api/games', { credentials: 'include' });
      if (!res.ok) return;
      const games = await res.json();
      const ul = document.getElementById('gamesList'); ul.innerHTML='';
      for(const g of games){ const li=document.createElement('li'); li.className='list-group-item d-flex justify-content-between align-items-center'; li.innerHTML = `<div>${g.date} — <strong>${g.title}</strong></div><div><button class='btn btn-sm btn-outline-primary viewGame' data-id='${g.id}'>View</button></div>`; ul.appendChild(li); }
      // attach view handlers
      document.querySelectorAll('.viewGame').forEach(b=>b.addEventListener('click', e=>{ const id=e.target.dataset.id; viewGame(id); }));
    }

    document.getElementById('btnHistory').addEventListener('click', ()=>{ document.getElementById('liveArea').style.display='none'; document.getElementById('historyArea').style.display='block'; });
    document.getElementById('btnGenerate').addEventListener('click', ()=>{ document.getElementById('historyArea').style.display='none'; document.getElementById('liveArea').style.display='block'; });

    document.getElementById('createGame').addEventListener('click', async ()=>{
      const title = prompt('Game title','Game'); if(!title) return;
      const res = await fetch('/api/games',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title,date:new Date().toISOString()}), credentials: 'include'});
      if (res.ok) { alert('Game created'); loadGames(); } else { const t = await res.json().catch(()=>({})); alert('Failed: '+(t.error||'unknown')); }
    });

    async function viewGame(id){
      const res = await fetch(`/api/games`, { credentials: 'include' });
      if (!res.ok) return; const games = await res.json(); const g = games.find(x=>String(x.id)===String(id)); if (!g) return alert('not found');
      alert(`Game: ${g.title}\nDate: ${g.date}`);
    }
  </script>
</body>
</html>
