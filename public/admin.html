<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — MAB sports</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app-body">
  <div class="container py-4">
    <h2 class="text-center">Admin Dashboard</h2>

    <div class="auth-wrapper d-flex justify-content-center align-items-center" style="min-height:40vh;">
      <div id="authBox" class="mb-3 w-100 d-flex justify-content-center">
        <form id="loginForm" class="row g-2" style="max-width:480px; width:100%">
          <div class="col-12"><input id="username" class="form-control" placeholder="Username" required></div>
          <div class="col-12"><input id="password" type="password" class="form-control" placeholder="Password" required></div>
          <div class="col-12 d-grid"><button class="btn btn-primary">Login</button></div>
        </form>
      </div>
    </div>

    <div id="dashboard" style="display:none">
      <div class="mb-3">
        <button id="createGame" class="btn btn-outline-primary">Create Game from Queue</button>
      </div>
      <div>
        <h4>Games</h4>
        <ul id="gamesList" class="list-group"></ul>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({username,password}), credentials: 'include'});
      if (res.ok) { document.getElementById('authBox').style.display='none'; document.getElementById('dashboard').style.display='block'; loadGames(); }
      else alert('login failed');
    });

    async function loadGames(){
      const res = await fetch('/api/games', { credentials: 'include' });
      if (!res.ok) { alert('Not authenticated'); return; }
      const games = await res.json();
      const ul = document.getElementById('gamesList'); ul.innerHTML='';
      for(const g of games){ const li=document.createElement('li'); li.className='list-group-item'; li.textContent = `${g.date} — ${g.title}`; ul.appendChild(li); }
    }

    document.getElementById('createGame').addEventListener('click', async ()=>{
      const title = prompt('Game title','Game');
      if (!title) return;
      const res = await fetch('/api/games',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({title,date:new Date().toISOString()}), credentials: 'include'});
      if (res.ok) { alert('Game created'); loadGames(); } else alert('Failed');
    });
  </script>
</body>
</html>
